name: CI

on:
  push:
  pull_request:

jobs:
  test-build:
    name: Test Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t vocab-test .

      - name: Smoke test
        run: |
          docker run -d --name vocab-test -p 3001:3000 \
            -e NODE_ENV=production \
            -e DATABASE_URL=file:/tmp/test.db \
            vocab-test
          sleep 5
          curl --fail http://localhost:3001/api/health
          docker stop vocab-test
