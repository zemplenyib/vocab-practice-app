services:
  vocab:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      # SQLite DB persisted on the host at /srv/vocab/vocab.db
      - /srv/vocab:/data
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/vocab.db
